name: Build APK

on:
  push:
    branches: [ '*' ]  # Trigger on push to all branches
  pull_request:
    branches: [ '*' ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build Debug APK (FOSS flavor)
      run: ./gradlew assembleFossDebug
      
    - name: Build Release APK (FOSS flavor)
      run: ./gradlew assembleFossRelease
      
    - name: Build Debug APK (Play flavor)
      run: ./gradlew assemblePlayDebug
      
    - name: Build Release APK (Play flavor)
      run: ./gradlew assemblePlayRelease
      
    - name: Upload FOSS Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: rush-foss-debug-apk
        path: app/build/outputs/apk/foss/debug/*.apk
        retention-days: 30
        
    - name: Upload FOSS Release APK
      uses: actions/upload-artifact@v4
      with:
        name: rush-foss-release-apk
        path: app/build/outputs/apk/foss/release/*.apk
        retention-days: 30
        
    - name: Upload Play Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: rush-play-debug-apk
        path: app/build/outputs/apk/play/debug/*.apk
        retention-days: 30
        
    - name: Upload Play Release APK
      uses: actions/upload-artifact@v4
      with:
        name: rush-play-release-apk
        path: app/build/outputs/apk/play/release/*.apk
        retention-days: 30